# ==============================================================================
# 1. PRINT START & END
# ==============================================================================
[gcode_macro START_PRINT]
description: Robust Start Routine with Pre-heating, Chamber Soak & Heavy Purge
gcode:
    {% set BED_TEMP = params.BED_TEMP|default(65)|float %}
    {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(205)|float %}
    {% set CHAMBER_TEMP = params.CHAMBER_TEMP|default(0)|float %}
    {% set SOAK_TIME = params.SOAK_TIME|default(0)|float %}
    {% set MATERIAL = params.MATERIAL|default('PLA')|string %}
    {% set saved_vars = printer.save_variables.variables %}
    {% set PREHEAT_TEMP = saved_vars.standby_temp | default(150) | float %}

    # Dynamic Axis Calculations
    {% set min_x = printer.toolhead.axis_minimum.x|float %}
    {% set min_y = printer.toolhead.axis_minimum.y|float %}
    
    # Dynamically pull the Klicky detach position for safe heat-soak parking
    {% set probe_settings = printer.configfile.settings['dockable_probe'] %}
    
    {% if probe_settings and probe_settings.detach_position %}
        {% set detach_str = probe_settings.detach_position|string %}
        {% set detach_arr = detach_str.split(',') %}
        {% set safe_park_x = detach_arr[0]|float %}
        {% set safe_park_y = detach_arr[1]|float %}
    {% else %}
        {% set safe_park_x = 100.0 %}
        {% set safe_park_y = printer.toolhead.axis_maximum.y - 5.0 %}
    {% endif %}

    # Fallback soak time for high-temp materials if CHAMBER_TEMP isn't reached
    {% if MATERIAL == 'ABS' or MATERIAL == 'ASA' or MATERIAL == 'PC' %}
        {% set SOAK_TIME = params.SOAK_TIME|default(2)|float %}
    {% endif %}

    RESPOND TYPE=echo MSG="🚀 START_PRINT: Target Bed: {BED_TEMP}C, Target Nozzle: {EXTRUDER_TEMP}C, Target Chamber: {CHAMBER_TEMP}C, Material: {MATERIAL}"
    status_busy

    CLEAR_PAUSE
    BED_MESH_CLEAR
    G90
    M220 S100
    M221 S100
    G92 E0

    RESPOND TYPE=echo MSG="🔥 START_PRINT: Heating bed to {BED_TEMP}C and nozzle to preheat temp ({PREHEAT_TEMP}C)..."
    M117 Pre-heating...
    LOAD_PID MATERIAL={MATERIAL} HEATER=heater_bed
    M140 S{BED_TEMP}
    M104 S{PREHEAT_TEMP}

    status_homing
    _CHOME

    # Safe Z-lift, park away from bed center to protect probe magnets from heat column
    RESPOND TYPE=echo MSG="🅿️ START_PRINT: Parking toolhead at safe coordinates X:{safe_park_x} Y:{safe_park_y}"
    G0 Z25 F1800
    G0 X{safe_park_x} Y{safe_park_y} F18000

    status_heating
    M117 Waiting for Temps...
    RESPOND TYPE=echo MSG="🔥 SYSTEM: Waiting for Temps..."
    M190 S{BED_TEMP}
    
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={PREHEAT_TEMP}
    _CHAMBER_SOAK CHAMBER_TEMP={CHAMBER_TEMP} SOAK_TIME={SOAK_TIME}

    G0 Z15 F3000

    status_meshing
    RESPOND TYPE=echo MSG="🎯 START_PRINT: Executing Bed Mesh..."
    M117 Bed Mesh...
    BED_MESH_CALIBRATE ADAPTIVE=1

    status_heating
    RESPOND TYPE=echo MSG="🔥 START_PRINT: Final heating to {EXTRUDER_TEMP}C..."
    M117 Final Heating...
    G0 Z10 F1800
    # Park symmetrically in the front left corner
    G0 X{min_x + 10} Y{min_y + 10} F9000
    
    M109 S{EXTRUDER_TEMP}

    status_purging
    RESPOND TYPE=echo MSG="💦 START_PRINT: Executing Heavy Purge."
    M117 Purging...

    G92 E0
    G0 Z0.28 F500 
    G1 X{min_x + 50} E15 F1200 
    G1 X{min_x + 90} F9000 
    G0 Z2 F9000 
    G92 E0 

    status_printing
    RESPOND TYPE=echo MSG="🟢 START_PRINT: Sequence Complete. Beginning Print!"
    M117 Print Started!

[gcode_macro PRINT_START]
gcode:
    START_PRINT {rawparams}

[gcode_macro _CHAMBER_SOAK]
description: Helper macro to defer Jinja evaluation until after the bed heats
gcode:
    {% set CHAMBER_TEMP = params.CHAMBER_TEMP|default(0)|float %}
    {% set SOAK_TIME = params.SOAK_TIME|default(0)|float %}
    
    # Klipper grabs this reading right NOW, dynamically.
    {% set CURRENT_CHAMBER = printer["temperature_sensor Chamber"].temperature|default(0)|float %}
    
    {% set min_x = printer.toolhead.axis_minimum.x|float %}
    {% set min_y = printer.toolhead.axis_minimum.y|float %}
    {% set center_x = (printer.toolhead.axis_maximum.x + min_x) / 2 %}
    {% set center_y = (printer.toolhead.axis_maximum.y + min_y) / 2 %}

    {% if CHAMBER_TEMP > 0 and CURRENT_CHAMBER < CHAMBER_TEMP %}
        RESPOND TYPE=echo MSG="🌪️ SYSTEM: Chamber ({CURRENT_CHAMBER}C) below target ({CHAMBER_TEMP}C). Activating forced convection..."
        M117 Chamber Soaking...
        G0 X{center_x} Y{center_y} F18000                # Move to center for air circulation
        G0 Z50 F9000                                    # Drop to Z=50
        M106 S255                                       # Turn on part cooling fan 100%
        TEMPERATURE_WAIT SENSOR="temperature_sensor Chamber" MINIMUM={CHAMBER_TEMP}
        M107                                            # Turn fan off
        RESPOND TYPE=echo MSG="✅ SYSTEM: Chamber target reached!"
        
    {% elif CHAMBER_TEMP > 0 and CURRENT_CHAMBER >= CHAMBER_TEMP %}
        RESPOND TYPE=echo MSG="✅ SYSTEM: Chamber is already {CURRENT_CHAMBER}C. Skipping heat soak!"
        
    {% elif SOAK_TIME > 0 %}
        RESPOND TYPE=echo MSG="⏱️ SYSTEM: Thermal soaking bed for {SOAK_TIME} minutes..."
        M117 Thermal Soaking {SOAK_TIME}m...
        G4 P{SOAK_TIME * 60000}
    {% endif %}

[gcode_macro END_PRINT]
description: Safe shutdown, park, and ooze prevention
gcode:
    RESPOND TYPE=echo MSG="🏁 END_PRINT: Print Finished. Initiating shutdown sequence."

    M83
    G1 E-2 F3000
    G1 E-5 F300
    M82

    {% set max_z = printer.toolhead.axis_maximum.z|float %}
    {% set act_z = printer.toolhead.position.z|float %}
    {% if act_z < (max_z - 10.0) %}
        {% set z_safe = 10.0 %}
    {% else %}
        {% set z_safe = max_z - act_z %}
    {% endif %}

    # Parametric symmetric parking coordinates
    {% set park_x = printer.toolhead.axis_minimum.x + 10.0 %}
    {% set park_y = printer.toolhead.axis_maximum.y - 10.0 %}

    RESPOND TYPE=echo MSG="🅿️ END_PRINT: Parking toolhead at X:{park_x} Y:{park_y} and lifting Z by {z_safe}mm."
    G91
    G1 Z{z_safe} F1800
    G90
    G0 X{park_x} Y{park_y} F18000

    M104 S0
    M140 S0
    M106 S100 
    UPDATE_DELAYED_GCODE ID=fan_off DURATION=300

    BED_MESH_CLEAR
    M84 X Y E
    RESPOND TYPE=echo MSG="🛑 END_PRINT: Heaters and XYE motors disabled. Z remains energized."
    M117 Print Complete!

    status_part_ready
    G4 P5000
    M117

[gcode_macro PRINT_END]
gcode:
    END_PRINT

# ==============================================================================
# 2. PAUSE, RESUME & CANCEL
# ==============================================================================
[gcode_macro CANCEL_PRINT]
description: Cancel print and safely park toolhead
rename_existing: BASE_CANCEL_PRINT
gcode:
    RESPOND TYPE=echo MSG="❌ CANCEL_PRINT: Print cancellation requested."
    {% if printer.extruder.temperature >= 180 %}
        RESPOND TYPE=echo MSG="❌ CANCEL_PRINT: Hotend active. Relieving pressure to prevent oozing."
        M83
        G1 E-3 F3000
        M82
    {% endif %}
    TURN_OFF_HEATERS

    {% set max_z = printer.toolhead.axis_maximum.z|float %}
    {% set act_z = printer.toolhead.position.z|float %}
    {% if act_z < (max_z - 10.0) %}
        {% set z_safe = 10.0 %}
    {% else %}
        {% set z_safe = max_z - act_z %}
    {% endif %}

    # Parametric symmetric parking coordinates
    {% set park_x = printer.toolhead.axis_minimum.x + 10.0 %}
    {% set park_y = printer.toolhead.axis_maximum.y - 10.0 %}

    G91
    G1 Z{z_safe} F1800
    G90
    G0 X{park_x} Y{park_y} F18000

    M107
    BED_MESH_CLEAR
    M84 X Y E

    BASE_CANCEL_PRINT
    RESPOND TYPE=echo MSG="❌ CANCEL_PRINT: Cancellation Complete."
    M117 Print Cancelled!
    status_canceled

[gcode_macro PAUSE]
description: Pause the actual running print safely
rename_existing: BASE_PAUSE
gcode:
    RESPOND TYPE=echo MSG="⏸️ PAUSE: Pause requested. Suspending print."
    status_paused

    # Parametric symmetric parking coordinates
    {% set park_x = printer.toolhead.axis_minimum.x + 10.0 %}
    {% set park_y = printer.toolhead.axis_maximum.y - 10.0 %}
    
    {% set max_z = printer.toolhead.axis_maximum.z|float %}
    {% set act_z = printer.toolhead.position.z|float %}
    {% if act_z < (max_z - 15.0) %}
        {% set z_lift = 10.0 %}
    {% else %}
        {% set z_lift = max_z - act_z %}
    {% endif %}

    BASE_PAUSE
    SAVE_GCODE_STATE NAME=PAUSE_state

    M83
    G1 E-3 F2100

    G91
    G1 Z{z_lift} F1800
    G90
    G0 X{park_x} Y{park_y} F5000
    RESPOND TYPE=echo MSG="⏸️ PAUSE: Toolhead safely parked."

[gcode_macro RESUME]
description: Resume the actual running print safely, with cold-extrusion protection
rename_existing: BASE_RESUME
gcode:
    # Get the target extruder temp from the active print state
    {% set EXTRUDER_TARGET = printer.extruder.target %}
    
    RESPOND TYPE=echo MSG="▶️ RESUME: Checking temps and preparing to resume."
    
    # If the target is set (an active print is paused) but it cooled down, reheat it
    {% if EXTRUDER_TARGET > 0 %}
        M109 S{EXTRUDER_TARGET}
    {% endif %}

    M83
    # Only prime the nozzle if we are safely above the cold extrusion limit (typically 170C)
    {% if printer.extruder.temperature >= 170 %}
        RESPOND TYPE=echo MSG="▶️ RESUME: Priming nozzle."
        G1 E5 F2100
        G1 E-1.5 F3000
    {% else %}
        RESPOND TYPE=echo MSG="⚠️ RESUME: Extruder too cold to prime! Skipping prime move."
    {% endif %}

    RESTORE_GCODE_STATE NAME=PAUSE_state MOVE=1 MOVE_SPEED=300

    {% if printer.extruder.temperature >= 170 %}
        G1 E1.5 F3000
    {% endif %}
    M82

    RESPOND TYPE=echo MSG="▶️ RESUME: Executing base resume."
    status_printing
    BASE_RESUME

# Mainsail Layer Pause Support
[gcode_macro SET_PAUSE_NEXT_LAYER]
description: Enable a pause if the next layer is reached
gcode:
  {% set pause_next_layer = printer['gcode_macro SET_PRINT_STATS_INFO'].pause_next_layer %}
  {% set ENABLE = params.ENABLE|default(1)|int != 0 %}
  {% set MACRO = params.MACRO|default(pause_next_layer.call, True) %}
  SET_GCODE_VARIABLE MACRO=SET_PRINT_STATS_INFO VARIABLE=pause_next_layer VALUE="{{ 'enable': ENABLE, 'call': MACRO }}"

[gcode_macro SET_PAUSE_AT_LAYER]
description: Enable/disable a pause if a given layer number is reached
gcode:
  {% set pause_at_layer = printer['gcode_macro SET_PRINT_STATS_INFO'].pause_at_layer %}
  {% set ENABLE = params.ENABLE|int != 0 if params.ENABLE is defined else params.LAYER is defined %}
  {% set LAYER = params.LAYER|default(pause_at_layer.layer)|int %}
  {% set MACRO = params.MACRO|default(pause_at_layer.call, True) %}
  SET_GCODE_VARIABLE MACRO=SET_PRINT_STATS_INFO VARIABLE=pause_at_layer VALUE="{{ 'enable': ENABLE, 'layer': LAYER, 'call': MACRO }}"

[gcode_macro SET_PRINT_STATS_INFO]
rename_existing: SET_PRINT_STATS_INFO_BASE
description: Overwrite, to get pause_next_layer and pause_at_layer feature
variable_pause_next_layer: { 'enable': False, 'call': "PAUSE" }
variable_pause_at_layer  : { 'enable': False, 'layer': 0, 'call': "PAUSE" }
gcode:
  {% if pause_next_layer.enable %}
    RESPOND TYPE=echo MSG='{"%s, forced by pause_next_layer" % pause_next_layer.call}'
    {pause_next_layer.call} 
    SET_PAUSE_NEXT_LAYER ENABLE=0
  {% elif pause_at_layer.enable and params.CURRENT_LAYER is defined and params.CURRENT_LAYER|int == pause_at_layer.layer %}
    RESPOND TYPE=echo MSG='{"%s, forced by pause_at_layer [%d]" % (pause_at_layer.call, pause_at_layer.layer)}'
    {pause_at_layer.call} 
    SET_PAUSE_AT_LAYER ENABLE=0
  {% endif %}
  SET_PRINT_STATS_INFO_BASE {rawparams}

# ==============================================================================
# 3. FILAMENT MANAGEMENT
# ==============================================================================
[gcode_macro LOAD_FILAMENT]
description: Smart loading that respects current temps and saved lengths
gcode:
    {% set saved_vars = printer.save_variables.variables %}
    {% set MIN_TEMP = saved_vars.filament_min_temp | default(230) | float %}
    {% set PURGE_LEN = saved_vars.filament_load_length | default(100) | float %}
    
    {% set CURRENT_TEMP = printer.extruder.temperature|float %}
    {% set TARGET_TEMP = printer.extruder.target|float %}

    {% if TARGET_TEMP > MIN_TEMP %}
        {% set SAFE_TEMP = TARGET_TEMP %}
    {% elif CURRENT_TEMP > MIN_TEMP %}
        {% set SAFE_TEMP = CURRENT_TEMP %}
    {% else %}
        {% set SAFE_TEMP = MIN_TEMP %}
    {% endif %}

    status_busy
    RESPOND TYPE=echo MSG="🔄 FILAMENT: Ensuring nozzle is at {SAFE_TEMP}C..."
    M109 S{SAFE_TEMP}

    M83              
    G1 E{PURGE_LEN} F250
    M82              
    RESPOND TYPE=echo MSG="🔄 FILAMENT: Load Complete."
    status_ready

[gcode_macro UNLOAD_FILAMENT]
description: Smart unloading that respects current temps and saved lengths
gcode:
    {% set saved_vars = printer.save_variables.variables %}
    {% set MIN_TEMP = saved_vars.filament_min_temp | default(230) | float %}
    {% set UNLOAD_LEN = saved_vars.filament_unload_length | default(100) | float %}
    
    {% set CURRENT_TEMP = printer.extruder.temperature|float %}
    {% set TARGET_TEMP = printer.extruder.target|float %}

    {% if TARGET_TEMP > MIN_TEMP %}
        {% set SAFE_TEMP = TARGET_TEMP %}
    {% elif CURRENT_TEMP > MIN_TEMP %}
        {% set SAFE_TEMP = CURRENT_TEMP %}
    {% else %}
        {% set SAFE_TEMP = MIN_TEMP %}
    {% endif %}

    status_busy
    RESPOND TYPE=echo MSG="🔄 FILAMENT: Ensuring nozzle is at {SAFE_TEMP}C..."
    M109 S{SAFE_TEMP}

    M83              
    G1 E-10 F600     # Quick pull to detach from meltzone
    G4 P2000         # Brief pause to let the tip cool slightly to prevent stringing 
    G1 E-{UNLOAD_LEN} F300    # Slow pull out of the heatbreak
    M82              
    RESPOND TYPE=echo MSG="🔄 FILAMENT: Unload Complete."
    status_ready

[gcode_macro M600]
gcode:
    CHANGE_FILAMENT  

[gcode_macro M601]
gcode:
    CHANGE_FILAMENT

[gcode_macro CHANGE_FILAMENT]
gcode:
    M117 Change Filament
    PAUSE
    M117

[gcode_macro SWAP_RESUME] 
gcode:
    RESTORE_GCODE_STATE NAME=PAUSE_state
    RESUME

# ==============================================================================
# 4. KINEMATICS & HOMING
# ==============================================================================
[gcode_macro _CHOME]
description: Conditional Homing
gcode:
    {% if printer["gcode_macro status_homing"] != null %}
        status_homing
    {% endif %}
    {% if "xyz" not in printer.toolhead.homed_axes %}
        RESPOND TYPE=echo MSG="🏠 SYSTEM: Axes not homed. Homing now..."
        G28
        M400
        RESPOND TYPE=echo MSG="🏠 SYSTEM: Homed all axis."
    {% else %}
        RESPOND TYPE=echo MSG="🏠 SYSTEM: Axes already homed. Skipping."
    {% endif %}
    {% if printer["gcode_macro status_ready"] != null %}
        status_ready
    {% endif %}

[homing_override]
axes: xyz
gcode:
    # --- ARM THE E-STOP ---
    SET_GCODE_VARIABLE MACRO=SAFETY_STATE VARIABLE=is_homing VALUE=True

    # --- TRIGGER HOMING ANIMATION ---
    status_homing

    # 1. Read parameters
    {% set home_x = 'X' in params or ('X' not in params and 'Y' not in params and 'Z' not in params) %}
    {% set home_y = 'Y' in params or ('X' not in params and 'Y' not in params and 'Z' not in params) %}
    {% set home_z = 'Z' in params or ('X' not in params and 'Y' not in params and 'Z' not in params) %}

    # 2. FIX THE DOCK CRASH
    {% if home_z %}
        {% if 'x' not in printer.toolhead.homed_axes %}
            {% set home_x = True %}
        {% endif %}
        {% if 'y' not in printer.toolhead.homed_axes %}
            {% set home_y = True %}
        {% endif %}
    {% endif %}

    # 3. SMART Z-HOP (Force Move)
    {% set z_max_triggered = not printer["filament_switch_sensor z_max_limit"].filament_detected %}
    {% set z_is_homed = 'z' in printer.toolhead.homed_axes %}

    {% if not z_max_triggered %}
        {% if not z_is_homed %}
            RESPOND TYPE=echo MSG="🏠 HOMING: Forcing safe Z-hop..."
            # If this blind move hits the switch, the E-Stop will fire immediately!
            FORCE_MOVE STEPPER=stepper_z DISTANCE=15 VELOCITY=15
        {% else %}
            G90
            G0 Z15 F1800
        {% endif %}
    {% else %}
        RESPOND TYPE=echo MSG="⚠️ HOMING: Bed is on Z-Max limit! Skipping Z-hop."
    {% endif %}

    # 4. Execute X and Y Homing
    {% if home_x %}
        G28 X
    {% endif %}
    {% if home_y %}
        G28 Y
    {% endif %}

    # 5. Execute Z Homing
    {% if home_z %}
        RESPOND TYPE=echo MSG="🏠 HOMING: Moving to safe Z center..."
        G90
        G0 X131 Y227 F9000
        
        # Trigger Klicky
        G28 Z
        
        G0 Z15 F1800
    {% endif %}

    # --- TRIGGER READY ANIMATION ---
    status_ready

    # --- DISARM THE E-STOP ---
    SET_GCODE_VARIABLE MACRO=SAFETY_STATE VARIABLE=is_homing VALUE=False

[gcode_macro Z_MAX_CRASH]
description: Dynamic shutdown (E-Stop during homing, Soft Crash during printing, Motor kill on idle)
gcode:
    # 1. Check if we are currently running a homing or force move operation
    {% set is_homing_active = printer["gcode_macro SAFETY_STATE"].is_homing %}

    # 2. THE HARD E-STOP (Interrupts blind FORCE_MOVE commands instantly)
    {% if is_homing_active %}
        {action_emergency_stop("🚨 CRITICAL: Z-Max limit hit during a Homing or Force Move operation!")}
    
    # 3. IDLE VS PRINTING CRASH LOGIC
    {% else %}
        RESPOND TYPE=error MSG="🚨 CRITICAL SAFETY: Z-Max Limit Switch Triggered!"
        
        {% if printer.idle_timeout.state == "Printing" %}
            # --- Active Print Crash ---
            RESPOND TYPE=error MSG="🛑 Stopping active print and running cool-down sequence..."
            BASE_CANCEL_PRINT
            TURN_OFF_HEATERS
            M106 S255
            UPDATE_DELAYED_GCODE ID=fan_off DURATION=300
        {% else %}
            # --- Idle Crash ---
            RESPOND TYPE=error MSG="🛑 Machine is idle. Cutting motor power immediately..."
        {% endif %}
        
        # --- Universal Actions ---
        M84
        status_canceled
        RESPOND TYPE=error MSG="🛑 SYSTEM HALTED: Motors disabled. You must re-home before continuing."
    {% endif %}

[gcode_macro SAFETY_STATE]
description: Stores dynamic safety variables
variable_is_homing: False
gcode:
    # This macro deliberately left empty

[gcode_macro HOMING_FIX]
description: Kinematic override to move toolhead without homing
gcode:
    RESPOND TYPE=echo MSG="⚠️ SYSTEM: Executing Kinematic Homing Fix!"
    {% set center_x = (printer.toolhead.axis_maximum.x + printer.toolhead.axis_minimum.x) / 2 %}
    G90
    SET_KINEMATIC_POSITION X=0 Y=0 Z=0
    G0 Z10 F1800
    G0 X{center_x} F3000
    M84
    RESPOND TYPE=echo MSG="⚠️ SYSTEM: Kinematic Homing Fix Complete. Motors disabled."

[gcode_macro BED_DOWN]
description: Kinematic override to lower bed (Z only) without homing
gcode:
    SET_GCODE_VARIABLE MACRO=SAFETY_STATE VARIABLE=is_homing VALUE=True
    # 1. Ask the physical limit switch if the bed is at the bottom (Sensor Hack)
    {% set z_max_triggered = not printer["filament_switch_sensor z_max_limit"].filament_detected %}

    {% if not z_max_triggered %}
        RESPOND TYPE=echo MSG="⚠️ SYSTEM: Forcing Bed Down 15mm."
        G90
        SET_KINEMATIC_POSITION Z=0
        G0 Z15 F1800
        M84
    {% else %}
        # Block the move and throw an error to the UI
        RESPOND TYPE=error MSG="❌ SYSTEM: Cannot force bed down. Physical Z-Max switch is already engaged!"
    {% endif %}
    SET_GCODE_VARIABLE MACRO=SAFETY_STATE VARIABLE=is_homing VALUE=False

# ==============================================================================
# 5. THERMAL & PID MANAGEMENT
# ==============================================================================
[gcode_macro CALIBRATE_HOTEND_PID]
description: Environmental temperature sweep + standby profile
gcode:
    # --- CONFIGURATION ---
    {% set START_TEMP = params.START_TEMP|default(200)|int %}
    {% set END_TEMP = params.END_TEMP|default(260)|int %}
    {% set STEP = params.STEP|default(5)|int %}
    
    # Environmental targets for accurate real-world tuning
    {% set BED_TEMP = params.BED_TEMP|default(100)|int %}
    {% set CHAMBER_TEMP = params.CHAMBER_TEMP|default(38)|int %}
    # ---------------------
    
    {% set center_x = (printer.toolhead.axis_maximum.x + printer.toolhead.axis_minimum.x) / 2 %}
    {% set center_y = (printer.toolhead.axis_maximum.y + printer.toolhead.axis_minimum.y) / 2 %}

    status_heating
    RESPOND TYPE=echo MSG="🔥 MASTER PID: Starting environmental calibration sequence..."
    
    # 1. Pre-heat bed simultaneously while homing
    RESPOND TYPE=echo MSG="🔥 MASTER PID: Igniting bed to {BED_TEMP}C for thermal simulation..."
    M140 S{BED_TEMP}
    
    _CHOME
    G0 Z25 F1800
    G0 X{center_x} Y{center_y} F18000
    
    # Wait for the bed to fully reach temp
    M190 S{BED_TEMP}

    # 2. Standby Calibration (Simulates pre-heat environment before chamber is soaked)
    {% set saved_vars = printer.save_variables.variables %}
    {% set STANDBY_TEMP = saved_vars.standby_temp | default(150) | int %}

    RESPOND TYPE=echo MSG="🔧 MASTER PID: Calibrating Extruder Standby at {STANDBY_TEMP}C..."
    PID_CALIBRATE HEATER=extruder TARGET={STANDBY_TEMP}
    PID_PROFILE SAVE={STANDBY_TEMP} HEATER=extruder
    SAVE_VARIABLE VARIABLE=standby_temp VALUE={STANDBY_TEMP}

    # 3. Environmental Chamber Soak (Prep for active printing sweep)
    {% set CURRENT_CHAMBER = printer["temperature_sensor Chamber"].temperature|default(0)|float %}
    
    {% if CHAMBER_TEMP > 0 and CURRENT_CHAMBER < CHAMBER_TEMP %}
        RESPOND TYPE=echo MSG="🌪️ MASTER PID: Soaking chamber to {CHAMBER_TEMP}C for active print temps..."
        M106 S255  # Blast part fan to circulate bed heat into the chamber
        TEMPERATURE_WAIT SENSOR="temperature_sensor Chamber" MINIMUM={CHAMBER_TEMP}
    {% elif CHAMBER_TEMP > 0 and CURRENT_CHAMBER >= CHAMBER_TEMP %}
        RESPOND TYPE=echo MSG="✅ MASTER PID: Chamber already at {CURRENT_CHAMBER}C. Proceeding."
    {% endif %}

    M106 S0  # Ensure part fan is off for the actual PID baseline

    RESPOND TYPE=echo MSG="🔥 MASTER PID: Moving to main sweep from {START_TEMP}C to {END_TEMP}C (Step: {STEP}C)..."

    # 4. Main Printing Temperature Sweep
    {% for temp in range(START_TEMP, END_TEMP + 1, STEP) %}
        RESPOND TYPE=echo MSG="🔧 MASTER PID: Calibrating Extruder at {temp}C..."
        PID_CALIBRATE HEATER=extruder TARGET={temp}
        PID_PROFILE SAVE={temp} HEATER=extruder
    {% endfor %}

    # --- SAVE BOUNDARIES TO VARIABLES.CFG ---
    SAVE_VARIABLE VARIABLE=hotend_pid_min VALUE={START_TEMP}
    SAVE_VARIABLE VARIABLE=hotend_pid_max VALUE={END_TEMP}

    # 5. Cool down
    M107  
    M104 S0
    M140 S0  
    
    status_ready
    RESPOND TYPE=echo MSG="✅ MASTER PID: Sequence complete! Type SAVE_CONFIG to commit profiles to disk."

[gcode_macro CALIBRATE_BED_PID]
description: Calibrate and save PID profiles sequentially for the bed from lowest to highest temp
gcode:
    # --- CONFIGURATION VARIABLES ---
    {% set tpu_temp = 50 %}
    {% set pla_temp = 60 %}
    {% set petg_temp = 80 %}
    {% set abs_temp = 100 %}
    {% set center_x = (printer.toolhead.axis_maximum.x + printer.toolhead.axis_minimum.x) / 2 %}
    {% set center_y = (printer.toolhead.axis_maximum.y + printer.toolhead.axis_minimum.y) / 2 %}
    # -------------------------------

    status_heating
    RESPOND TYPE=echo MSG="🔥 BED PID: Starting low-to-high bed calibration sequence..."
    
    _CHOME
    G0 Z25 F1800
    G0 X{center_x} Y{center_y} F18000

    RESPOND TYPE=echo MSG="🔧 BED PID (1/4): Calibrating TPU Bed ({tpu_temp}C)..."
    PID_CALIBRATE HEATER=heater_bed TARGET={tpu_temp} TOLERANCE=0.1
    PID_PROFILE SAVE=TPU HEATER=heater_bed

    RESPOND TYPE=echo MSG="🔧 BED PID (2/4): Calibrating PLA Bed ({pla_temp}C)..."
    PID_CALIBRATE HEATER=heater_bed TARGET={pla_temp} TOLERANCE=0.1
    PID_PROFILE SAVE=PLA HEATER=heater_bed

    RESPOND TYPE=echo MSG="🔧 BED PID (3/4): Calibrating PETG Bed ({petg_temp}C)..."
    PID_CALIBRATE HEATER=heater_bed TARGET={petg_temp} TOLERANCE=0.1
    PID_PROFILE SAVE=PETG HEATER=heater_bed

    RESPOND TYPE=echo MSG="🔧 BED PID (4/4): Calibrating ABS Bed ({abs_temp}C)..."
    PID_CALIBRATE HEATER=heater_bed TARGET={abs_temp} TOLERANCE=0.1
    PID_PROFILE SAVE=ABS HEATER=heater_bed

    M140 S0  
    
    status_ready
    RESPOND TYPE=echo MSG="✅ BED PID: All bed profiles calibrated! Type SAVE_CONFIG to commit them to disk."

[gcode_macro LOAD_PID]
description: Safely loads Kalico PID profiles using smart temperature rounding and dynamic boundaries
gcode:
    {% set TEMP = params.TEMP|default(0)|float %}
    {% set HEATER = params.HEATER|default('extruder')|string %}
    {% set MATERIAL = params.MATERIAL|default('')|string %}

    # Pull dynamic boundaries from variables.cfg (with safe defaults if they don't exist yet)
    {% set saved_vars = printer.save_variables.variables %}
    {% set standby = saved_vars.standby_temp | default(150) | int %}
    {% set pid_min = saved_vars.hotend_pid_min | default(200) | int %}
    {% set pid_max = saved_vars.hotend_pid_max | default(260) | int %}

    # 1. Hotend Logic: Round requested temperature to the nearest 5 degrees
    {% if TEMP > 0 %}
        {% set rounded_temp = ((TEMP / 5.0)|round|int) * 5 %}
        {% set profile_name = "pid_profile " ~ HEATER ~ " " ~ rounded_temp %}
        
        # Check if the exact rounded profile exists
        {% if printer.configfile.config[profile_name] %}
            RESPOND TYPE=echo MSG="🔄 LOAD_PID: Target {TEMP}C -> Loading {rounded_temp}C PID profile for {HEATER}..."
            PID_PROFILE LOAD={rounded_temp} HEATER={HEATER}
            
        # If it doesn't exist, use smart boundary fallbacks
        {% else %}
            {% if TEMP < pid_min %}
                RESPOND TYPE=echo MSG="⚠️ LOAD_PID: {rounded_temp}C not found. Falling back to {standby}C Standby PID."
                PID_PROFILE LOAD={standby} HEATER={HEATER}
            {% elif TEMP > pid_max %}
                RESPOND TYPE=echo MSG="⚠️ LOAD_PID: {rounded_temp}C not found. Falling back to Max {pid_max}C PID."
                PID_PROFILE LOAD={pid_max} HEATER={HEATER}
            {% else %}
                # Absolute fallback if somehow it misses everything
                RESPOND TYPE=echo MSG="⚠️ LOAD_PID: No profile found for {HEATER}. Using default PID."
            {% endif %}
        {% endif %}

    # 2. Bed Logic: Fallback to Material strings (ABS, PLA, etc.)
    {% elif MATERIAL != '' %}
        {% set profile_name = "pid_profile " ~ HEATER ~ " " ~ MATERIAL %}
        
        {% if printer.configfile.config[profile_name] %}
            RESPOND TYPE=echo MSG="🔄 LOAD_PID: Loading {MATERIAL} PID profile for {HEATER}..."
            PID_PROFILE LOAD={MATERIAL} HEATER={HEATER}
        {% else %}
            RESPOND TYPE=echo MSG="⚠️ LOAD_PID: No {MATERIAL} profile found for {HEATER}. Using default PID."
        {% endif %}
        
    {% endif %}

# ==============================================================================
# 6. SLICER INTERCEPTS
# ==============================================================================
[gcode_macro M104]
description: Intercepts M104 to dynamically swap PID profiles mid-print
rename_existing: M99104
gcode:
    {% set S = params.S|default(0)|float %}
    
    {% if S > 0 %}
        # Intercept the target temp and load the nearest Kalico profile
        LOAD_PID TEMP={S} HEATER=extruder
    {% endif %}
    
    # Pass ALL original parameters (including T0 if the slicer sent it) back to Klipper
    M99104 {rawparams}

[gcode_macro M109]
description: Intercepts M109 to dynamically swap PID profiles and wait
rename_existing: M99109
gcode:
    {% set S = params.S|default(0)|float %}
    
    {% if S > 0 %}
        # Intercept the target temp and load the nearest Kalico profile
        LOAD_PID TEMP={S} HEATER=extruder
    {% endif %}
    
    # Pass ALL original parameters back to Klipper to maintain native wait logic
    M99109 {rawparams}

[gcode_macro M141]
description: Intercept Slicer Chamber Temp (Passive)
gcode:
    {% set S = params.S|default(0)|float %}
    # We only have a passive sensor, so we just acknowledge the slicer's target
    RESPOND TYPE=echo MSG="M141: Slicer requested chamber temp of {S}C."

[gcode_macro M191]
description: Intercept Slicer Chamber Wait (Passive)
gcode:
    {% set S = params.S|default(0)|float %}
    # If a wait is requested outside of our START_PRINT macro, handle it gracefully
    {% if S > 0 %}
        RESPOND TYPE=echo MSG="M191: Waiting for passive chamber to reach {S}C..."
        TEMPERATURE_WAIT SENSOR="temperature_sensor Chamber" MINIMUM={S}
    {% endif %}

# ==============================================================================
# 7. CALIBRATION & DIAGNOSTICS
# ==============================================================================
[delayed_gcode fan_off]
gcode:
    # Check if the extruder is still dangerously hot (above 60C)
    {% if printer.extruder.temperature > 60.0 %}
        # Still hot. Check again in 30 seconds.
        UPDATE_DELAYED_GCODE ID=fan_off DURATION=30
    {% else %}
        # Safely cooled down. Kill the fan.
        M107
        RESPOND TYPE=echo MSG="❄️ SYSTEM: Hotend safely cooled below 60C. Part fan disabled."
    {% endif %}

[gcode_macro _WAIT]
gcode:
    {% set TIME = params.TIME|default(0)|int %}
    G4 P{TIME*1000}

[gcode_macro AUTO_SHAPER]
gcode:
    status_busy
    _CHOME
    M104 S0
    M140 S0
    M107
    SHAPER_CALIBRATE AXIS=Y
    SHAPER_CALIBRATE AXIS=X
    status_ready
    M107
    M104 S0

[gcode_macro Accuracy_Test]
gcode:
    {% set center_x = (printer.toolhead.axis_maximum.x + printer.toolhead.axis_minimum.x) / 2 %}
    {% set center_y = (printer.toolhead.axis_maximum.y + printer.toolhead.axis_minimum.y) / 2 %}
    _CHOME
    status_meshing
    G90
    G1 X{center_x} Y{center_y} F18000
    PROBE_ACCURACY
    G1 Z15 F1800
    G1 X{printer.toolhead.axis_minimum.x + 10} Y{printer.toolhead.axis_maximum.y - 10} F18000
    status_ready

[gcode_macro INIT_SYSTEM_VARS]
description: One-time setup to populate variables.cfg with baseline defaults
gcode:
    RESPOND TYPE=echo MSG="⚙️ SYSTEM: Writing base variables to disk..."
    
    # Thermal Boundaries
    SAVE_VARIABLE VARIABLE=standby_temp VALUE=150
    SAVE_VARIABLE VARIABLE=hotend_pid_min VALUE=200
    SAVE_VARIABLE VARIABLE=hotend_pid_max VALUE=260
    
    # Filament Kinematics
    SAVE_VARIABLE VARIABLE=filament_min_temp VALUE=230
    SAVE_VARIABLE VARIABLE=filament_load_length VALUE=100
    SAVE_VARIABLE VARIABLE=filament_unload_length VALUE=100
    
    RESPOND TYPE=echo MSG="✅ SYSTEM: Variables initialized! You can now safely edit variables.cfg directly."

[gcode_macro update_git]
gcode:
    {% set message = params.MESSAGE|default() %}
    {% if message %}
        RUN_SHELL_COMMAND CMD=update_git_script_message PARAMS="'{params.MESSAGE}'"
    {% else %}
        RUN_SHELL_COMMAND CMD=update_git_script
    {% endif %}

[gcode_shell_command update_git_script]
command: bash -c "bash $HOME/klipper-backup/script.sh"
timeout: 90.0
verbose: True

[gcode_shell_command update_git_script_message]
command: bash -c "bash $HOME/klipper-backup/script.sh -c \"$0\""
timeout: 90.0
verbose: True