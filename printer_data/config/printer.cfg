[include led_run.cfg]
[include macros.cfg]
[include sfs.cfg]

[mcu]
canbus_uuid: 087084b4331e

[mcu EBB]
canbus_uuid: e326387e14f9

[printer]
kinematics: limited_corexy
max_velocity: 500
max_accel: 9500          # Unlocked by your new Y-axis profile
max_x_accel: 6100        # The absolute safe limit for your X-axis right now
max_y_accel: 9500        # Matched to your clean Y-axis capability
scale_xy_accel: True
minimum_cruise_ratio: 0.1
square_corner_velocity: 5.0
max_z_velocity: 30
max_z_accel: 500

[stepper_x]
step_pin: PE2
dir_pin: !PB4
enable_pin: !PC11
microsteps: 16
rotation_distance: 40
endstop_pin: tmc2209_stepper_x:virtual_endstop
position_min: -5
position_endstop: -5
min_home_dist: 10
position_max: 285
homing_speed: 60
homing_retract_dist: 0          # Single decisive bump for Sensorless X
use_sensorless_homing: True

[stepper_y]
step_pin: PF12
dir_pin: !PF11
enable_pin: !PB3
microsteps: 16
rotation_distance: 40
endstop_pin: ^PF4               # Physical Endstop
position_endstop: 305
position_min: -1
position_max: 305
homing_speed: 60
second_homing_speed: 30
homing_retract_dist: 3          # Double bump kept for Physical Y switch

[stepper_z]
step_pin: PD7
dir_pin: !PD6
enable_pin: !PF10
rotation_distance: 4
microsteps: 32
endstop_pin: probe:z_virtual_endstop
position_max: 260
position_min: -4
homing_speed: 10                # Increased from 6 for a faster initial Z approach
second_homing_speed: 3.0
homing_retract_dist: 1.5

[extruder]
step_pin: EBB: PD0
dir_pin: EBB: PD1
enable_pin: !EBB: PD2
microsteps: 16
rotation_distance: 7.6532 #7.1
nozzle_diameter: 0.4
filament_diameter: 1.75
heater_pin: EBB: PB13
sensor_type: EPCOS 100K B57560G104F
sensor_pin: EBB: PA3
#control: pid_v
#pid_Kp: 22.2
#pid_Ki: 1.08
#pid_Kd: 114
pressure_advance: 0.026
pressure_advance_smooth_time: 0.03
min_extrude_temp: 50
min_temp: 0
max_temp: 300
max_extrude_cross_section:25
max_extrude_only_distance: 200.0

[firmware_retraction]
retract_length: 0.5       # A safe starting point for direct drive
retract_speed: 40         # Retract speed in mm/s
unretract_extra_length: 0 # Only change this if you are getting gaps on seams
unretract_speed: 30       # Slightly slower unretract helps prevent clogs

[tmc2209 extruder]
uart_pin: EBB: PA15
interpolate: False
hold_current: 0.4
run_current: 0.650
sense_resistor: 0.110
stealthchop_threshold: 0

[heater_bed]
heater_pin: PB7
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PA0
#control: pid_v
#pid_Kp: 54.027
#pid_Ki: 0.770
#pid_Kd: 948.182
min_temp: -200
max_temp: 120

[temperature_sensor Chamber]
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PA1
min_temp: 0
max_temp: 120

[dockable_probe]
pin: EBB: PB8
x_offset: 5
y_offset: 45
#z_offset: 8.530
samples_result: median
samples_tolerance: 0.05
speed: 2.0
lift_speed: 6.0
sample_retract_dist: 2
samples: 1
samples_tolerance_retries: 12
drop_first_result: true
dock_position: 131,305
approach_position: 131,280 #131,290
detach_position: 100,305 #70,300
check_open_attach: True
attach_speed: 500
detach_speed: 500
travel_speed: 500
restore_toolhead: False
dock_retries: 12

[bed_mesh]
probe_count: 7,7
algorithm: bicubic
bicubic_tension: 0.2
speed: 300
horizontal_move_z: 15
mesh_min: 15,50
mesh_max: 265,285
mesh_pps: 4,4
adaptive_margin: 5
zero_reference_position: 136, 285
fade_start: 1.0       
fade_end: 10.0        
fade_target: 0

[axis_twist_compensation]
speed: 150
horizontal_move_z: 12
calibrate_start_x: 15
calibrate_end_x: 275
calibrate_y: 150

[bed_screws]
screw1: 30, 35
screw1_name: front left screw
screw2: 255, 35
screw2_name: front right screw
screw3: 255, 270
screw3_name: rear right screw
screw4: 30, 279
screw4_name: rear left screw
horizontal_move_z: 10
speed: 50

[safe_z_home]
#home_xy_position: 61,245
#home_xy_position: 5,250
home_xy_position: 131, 240
speed: 300
z_hop:15
z_hop_speed: 30

[temperature_sensor mcu]
sensor_type: temperature_mcu
min_temp: 0
max_temp: 100

[temperature_sensor RPi]
sensor_type: temperature_host
min_temp: 0
max_temp: 100

[temperature_sensor EBB]
sensor_type: temperature_mcu
sensor_mcu: EBB
min_temp: 0
max_temp: 85

[adxl345]
cs_pin: EBB: PB12
spi_software_sclk_pin: EBB: PB10
spi_software_mosi_pin: EBB: PB11
spi_software_miso_pin: EBB: PB2
axes_map: x,y,z

[resonance_tester]
accel_chip: adxl345
probe_points:
    140, 152, 20  # True dead-center based on your specific axis minimums and maximums

[fan]
pin: EBB: PA0

[heater_fan hotend_fan]
pin: EBB: PA1
heater: extruder
heater_temp: 50.0


[neopixel rgb]
pin: PA9
chain_count: 24
color_order: GRB
initial_RED: 0.0
initial_GREEN: 0.0
initial_BLUE: 0.0

