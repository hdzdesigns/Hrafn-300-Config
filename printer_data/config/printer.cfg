[tmc2209 stepper_x]
uart_pin: PC10
diag_pin: PF3
run_current: 1.0
hold_current: 0.5
home_current: 0.5
interpolate: True
sense_resistor: 0.110
stealthchop_threshold: 0
driver_sgthrs: 95

[tmc2209 stepper_y]
uart_pin: PF13
run_current: 1.0
hold_current: 0.5
home_current: 0.5
interpolate: True
sense_resistor: 0.110
stealthchop_threshold: 0

[tmc2209 stepper_z]
uart_pin: PF9
#diag_pin: PF5
interpolate: False
hold_current: 0.5
run_current: 1.0
sense_resistor: 0.110
stealthchop_threshold: 0

[save_variables]
filename: ~/printer_data/config/variables.cfg

[idle_timeout]
timeout: 1800

[gcode_arcs]
resolution: 1.0

[virtual_sdcard]
path: ~/printer_data/gcodes
on_error_gcode: CANCEL_PRINT

[exclude_object]

[display_status]

[respond]

[pause_resume]

[force_move]
enable_force_move: True

