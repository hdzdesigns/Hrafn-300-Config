# ==============================================================================
# ANIMATION DEFINITIONS
# ==============================================================================
[led_effect status_ready]
autostart: true
frame_rate: 24
leds: neopixel:rgb
layers:
    breathing  10 1 top (1.0, 1.0, 1.0) # Slow white breathing

[led_effect status_busy]
autostart: false
frame_rate: 24
leds: neopixel:rgb
layers:
    breathing  3 1 top (1, 0, 0) # Fast red breathing

[led_effect status_heating]
leds: neopixel:rgb
autostart: false
frame_rate: 24
layers:
    breathing  3 1 top (1, 0.18, 0) # Orange/Red pulsing

[led_effect status_homing]
autostart: false
frame_rate: 24
leds: neopixel:rgb
layers:
    chase 0.5 0.5 add (0.1, 0.6, 0.2) # Chasing green

[led_effect status_meshing]
autostart: false
frame_rate: 24
leds: neopixel:rgb
layers:
    chase 0.25 0.5 add (0.2, 1.0, 0.0) # Fast chasing bright green

[led_effect status_purging]
autostart: false
frame_rate: 24
leds: neopixel:rgb
layers:
    chase 0.25 0.75 add (1.0, 0.5, 0.0) # Fast orange wipe

[led_effect status_printing]
autostart: false
frame_rate: 24
leds: neopixel:rgb
layers:
    static 1 0 top (1.0, 1.0, 1.0) # Solid bright white for visibility

[led_effect status_paused]
autostart: false
frame_rate: 24
leds: neopixel:rgb
layers:
    breathing 3 1 top (1.0, 1.0, 0.0) # Breathing yellow

[led_effect status_canceled]
autostart: false
frame_rate: 24
leds: neopixel:rgb
layers:
    strobe 1 1.5 add (1.0, 0.0, 0.0) # Flashing red

[led_effect status_part_ready]
autostart: false
frame_rate: 24
leds: neopixel:rgb
layers:
    gradient 0.3 1 add (0.3, 0.0, 0.0),(0.0, 0.3, 0.0),(0.0, 0.0, 0.3) # Rainbow gradient

# ==============================================================================
# WRAPPER MACROS (Call these inside your macro.cfg)
# ==============================================================================
[gcode_macro status_ready]
gcode:
    STOP_LED_EFFECTS
    SET_LED_EFFECT EFFECT=status_ready

[gcode_macro status_busy]
gcode:
    STOP_LED_EFFECTS
    SET_LED_EFFECT EFFECT=status_busy

[gcode_macro status_heating]
gcode:
    STOP_LED_EFFECTS
    SET_LED_EFFECT EFFECT=status_heating

[gcode_macro status_homing]
gcode:
    STOP_LED_EFFECTS
    SET_LED_EFFECT EFFECT=status_homing

[gcode_macro status_meshing]
gcode:
    STOP_LED_EFFECTS
    SET_LED_EFFECT EFFECT=status_meshing

[gcode_macro status_purging]
gcode:
    STOP_LED_EFFECTS
    SET_LED_EFFECT EFFECT=status_purging

[gcode_macro status_printing]
gcode:
    STOP_LED_EFFECTS
    SET_LED_EFFECT EFFECT=status_printing

[gcode_macro status_paused]
gcode:
    STOP_LED_EFFECTS
    SET_LED_EFFECT EFFECT=status_paused

[gcode_macro status_canceled]
gcode:
    STOP_LED_EFFECTS
    SET_LED_EFFECT EFFECT=status_canceled

[gcode_macro status_part_ready]
gcode:
    STOP_LED_EFFECTS
    SET_LED_EFFECT EFFECT=status_part_ready

[gcode_macro status_off]
gcode:
    STOP_LED_EFFECTS
    SET_LED LED="rgb" RED=0 GREEN=0 BLUE=0 SYNC=0 TRANSMIT=1

[delayed_gcode LED_DELAY]
initial_duration: 300.0 # Shut off after 5 minutes of idle
gcode:
    status_off