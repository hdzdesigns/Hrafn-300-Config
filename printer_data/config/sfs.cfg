# ==============================================================================
# SMART FILAMENT SENSOR (SFS) CONFIGURATION & MACROS
# ==============================================================================

[filament_motion_sensor encoder_sensor]
detection_length: 14.0
extruder: extruder
switch_pin: PC1
pause_on_runout: False
runout_gcode:
    RESPOND TYPE=error MSG="🚨 SFS EVENT: Filament Runout or Jam Detected! Initiating Pause."
    M117 Filament Runout/Jam!
    PAUSE
insert_gcode:
    RESPOND TYPE=echo MSG="✅ SFS EVENT: Filament Insertion Detected."
    M117 Filament Inserted

[gcode_macro SFS_ENABLE]
description: Enable smart filament sensor with logging
gcode:
    RESPOND TYPE=echo MSG="⚙️ SFS: Smart Filament Sensor ENABLED."
    SET_FILAMENT_SENSOR SENSOR=encoder_sensor ENABLE=1

[gcode_macro SFS_DISABLE]
description: Disable smart filament sensor with logging
gcode:
    RESPOND TYPE=echo MSG="⚙️ SFS: Smart Filament Sensor DISABLED."
    SET_FILAMENT_SENSOR SENSOR=encoder_sensor ENABLE=0